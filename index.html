<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Générateur Carte Membre - PVC PRO</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#eef2f7;
    padding:20px;
}

.main-title{
    text-align:center;
    color:#003366;
    margin-bottom:25px;
}

/* LAYOUT */
.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:30px;
    flex-wrap:wrap;
}

/* FORM */
form{
    width:280px;
    background:#fff;
    padding:18px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    gap:12px;
}

form label{
    font-size:13px;
    font-weight:bold;
    color:#003366;
}

form input{
    padding:10px;
    border-radius:7px;
    border:1px solid #ccc;
}

form button{
    padding:10px;
    border:none;
    border-radius:7px;
    background:#003366;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* CARTES */
#cardsContainer{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

/* CARTE PVC */
.card{
    width:85.6mm;
    height:54mm;
    border-radius:10px;

    background:linear-gradient(135deg,#003366,#0055aa,#0077cc);

    position:relative;
    overflow:hidden;

    color:white;
    box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* HEADER */
.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px 0;
}

.top-logo{
    width:35px;
    height:35px;
    background:white;
    border-radius:50%;
    padding:2px;
}

.header-title{
    font-size:14px;
    font-weight:bold;
}

/* BODY */
.card-body{
    display:flex;
    gap:10px;
    padding:5px 10px;
}

.photo{
    width:70px;
    height:85px;
    background:white;
    border-radius:8px;
    overflow:hidden;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.infos{
    display:flex;
    flex-direction:column;
    gap:4px;
    font-size:9px;
    padding-right:60px;
}

.member-name{
    font-size:14px;
    font-weight:bold;
    color:#ffcc00;
}

.info-line{
    display:flex;
    flex-wrap:wrap;
    gap:4px;
}

.label{
    font-weight:bold;
}

/* QR */
.qr{
    position:absolute;
    bottom:10px;
    right:10px;
    background:white;
    padding:4px;
    border-radius:6px;
}

/* DELETE */
.delete-btn{
    position:absolute;
    bottom:10px;
    left:10px;
    width:22px;
    height:22px;
    border:none;
    border-radius:50%;
    background:white;
    color:red;
    cursor:pointer;
}

/* 🖨️ PRINT MODE PVC VERTICAL */
@media print {

    body{
        background:white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    .main-title,
    form{
        display:none !important;
    }

    #cardsContainer{
        display:flex;
        flex-direction:column;

        align-items:center;
        justify-content:flex-start;

        gap:6mm;

        padding:10mm;
    }

    .card{
        width:85.6mm;
        height:54mm;

        box-shadow:none !important;
        page-break-inside: avoid;

        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
}

/* RESPONSIVE */
@media(max-width:768px){
    .container{
        flex-direction:column;
        align-items:center;
    }
}

</style>
</head>

<body>

<h2 class="main-title">Générateur Carte Membre - PVC PRO</h2>

<div class="container">

<form id="cardForm">

<label>Nom</label>
<input type="text" id="nom" required>

<label>Prénom</label>
<input type="text" id="prenom" required>

<label>Fonction</label>
<input type="text" id="fonction" required>

<label>ID Carte</label>
<input type="text" id="idCarte" placeholder="Automatique si vide">

<label>Pays de résidence</label>
<input type="text" id="pays" required>

<label>Date de naissance</label>
<input type="date" id="dob" required>

<label>Lieu de naissance</label>
<input type="text" id="lieuNaissance" required>

<label>Numéro WhatsApp</label>
<input type="text" id="telephone" required>

<label>Photo</label>
<input type="file" id="photo">

<button type="submit">Créer la carte</button>

<button type="button" onclick="window.print()">
🖨️ Imprimer PVC
</button>

</form>

<div id="cardsContainer"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

const form = document.getElementById("cardForm");
const cardsContainer = document.getElementById("cardsContainer");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const nom = document.getElementById("nom").value;
    const prenom = document.getElementById("prenom").value;
    const fonction = document.getElementById("fonction").value;
    const pays = document.getElementById("pays").value;
    const dob = document.getElementById("dob").value;
    const lieuNaissance = document.getElementById("lieuNaissance").value;
    const telephone = document.getElementById("telephone").value;

    let idCarte = document.getElementById("idCarte").value;

    if(!idCarte){
        idCarte = "KWR" + Date.now().toString().slice(-6);
    }

    const photoInput = document.getElementById("photo");

    let photoURL = "https://via.placeholder.com/150";

    function createCard(){

        const card = document.createElement("div");

        card.classList.add("card");

        card.innerHTML = `
        <div class="card-header">

            <img 
            src="images/logo-art.png" 
            class="top-logo"
            >

            <div class="header-title">
            Republique de Guinée
            </div>

            <img 
            src="images/mains.png" 
            class="top-logo"
            >

        </div>

        <div class="card-body">

            <div class="photo">
                <img src="${photoURL}">
            </div>

            <div class="infos">

                <div class="member-name">
                ${prenom} ${nom}
                </div>

                <div class="info-line">
                <span class="label">ID :</span> ${idCarte}
                </div>

                <div class="info-line">
                <span class="label">Pays :</span> ${pays}
                </div>

                <div class="info-line">
                <span class="label">Naissance :</span> ${dob}
                </div>

                <div class="info-line">
                <span class="label">Lieu :</span> ${lieuNaissance}
                </div>

                <div class="info-line">
                <span class="label">WhatsApp :</span> ${telephone}
                </div>

                <div class="info-line">
                <span class="label">Fonction :</span> ${fonction}
                </div>

            </div>

        </div>

        <div class="qr"></div>

        <button class="delete-btn">×</button>
        `;

        cardsContainer.appendChild(card);

        const qrElement = card.querySelector(".qr");

        qrElement.innerHTML = "";

        new QRCode(qrElement, {
            text: "Pottal Misside Lambecare",
            width: 40,
            height: 40
        });

        card.querySelector(".delete-btn").addEventListener("click", ()=>{
            card.remove();
        });

        form.reset();
    }

    if(photoInput.files[0]){

        const reader = new FileReader();

        reader.onload = e=>{
            photoURL = e.target.result;
            createCard();
        };

        reader.readAsDataURL(photoInput.files[0]);

    } else {

        createCard();

    }

});

</script>

</body>
</html>
